<div id="screen-form" class="screen">

  <div class="form-panel" style="width:460px;">
    <div class="form-inner">
      <div class="section-label">Form Builder</div>

      <div class="field">
        <label>Form Title</label>
        <input type="text" id="form-title" value="Course Enquiry Form" placeholder="Course Enquiry Form">
      </div>
      <div class="field">
        <label>Submit Button Text</label>
        <input type="text" id="form-submit-text" value="Submit Form" placeholder="Submit Form">
      </div>

      <div class="section-label" style="margin-top:16px;">Thank You Message</div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="form-ty-title" value="Form submitted" placeholder="Form submitted">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="form-ty-desc" rows="2" placeholder="Thank you for sharing the information. We will contact you soon.">Thank you for sharing the information. We will contact you soon.</textarea>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>Recipient(s) <span style="font-weight:400;color:var(--muted);font-size:11px;">— separate multiple emails with ;</span></label>
        <input type="text" id="form-recipients" placeholder="office@example.com; info@example.com">
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;">
        <div class="section-label" style="margin:0;">Enquiry Options</div>
        <button class="btn-add-block" onclick="addEnquiryOption()" style="margin:0;width:auto;padding:6px 14px;">+ Add Option</button>
      </div>
      <div id="form-enquiry-list">
        <div style="text-align:center;padding:12px;font-size:12px;color:var(--muted);">No options yet. Click + Add Option.</div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;">
        <div id="form-status" style="font-size:12px;min-height:18px;"></div>
        <button class="btn-gen" onclick="generateFormHtml()">&#x25B6; Generate &amp; Save</button>
      </div>
    </div>
  </div>

  <div class="output-panel">
    <div class="output-topbar">
      <div id="form-ot-preview" class="out-tab active" onclick="switchFormOut('preview')">Preview</div>
      <div id="form-ot-code" class="out-tab" onclick="switchFormOut('code')">Code</div>
    </div>
    <div class="output-body" style="padding:0;">
      <div id="form-out-preview" style="flex:1;overflow:auto;padding:32px;display:flex;justify-content:center;align-items:flex-start;background:#f3f4f6;">
        <div style="text-align:center;padding:40px 0;font-size:13px;color:var(--muted);">Click Generate &amp; Save to preview the form.</div>
      </div>
      <div id="form-out-code" style="display:none;position:relative;padding:16px;">
        <button class="btn-copy" style="position:absolute;top:24px;right:24px;" onclick="doCopy('form-code-box',this)">Copy</button>
        <pre class="code-box" id="form-code-box" style="min-height:300px;margin:0;"></pre>
      </div>
    </div>
  </div>

</div>
