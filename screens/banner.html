<div id="screen-banner" class="screen">
  <div class="form-panel"><div class="form-inner">
    <div class="section-label" style="margin:0 0 12px 0;">Banners</div>
    <button class="btn-gen" style="padding:8px 18px;font-size:13px;margin-bottom:16px;" onclick="addBanner()">+ New Banner</button>
    <div id="banner-list">
      <div style="text-align:center;font-size:12px;color:var(--muted);padding:32px 0;">Loading banners…</div>
    </div>
  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="banner-ot-preview" onclick="switchBannerOut('preview')">Preview</div>
      <div class="out-tab" id="banner-ot-code" onclick="switchBannerOut('code')">Inject Code</div>
    </div>
    <div class="output-body">
      <div id="banner-out-preview" style="background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;min-height:300px;">
        <div id="banner-live-preview" style="padding:0;"></div>
        <div id="banner-preview-hint" style="padding:32px;color:var(--muted);font-size:13px;text-align:center;">
          Click "Save (Preview)" on a banner to see the preview here.
        </div>
      </div>
      <div id="banner-out-code" style="display:none;">
        <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px;">
          Paste this script <strong>once</strong> per Zenler page for this banner. Future publishes update automatically — no need to re-paste.
        </div>
        <div style="position:relative;">
          <button class="btn-copy" style="position:absolute;top:8px;right:8px;" onclick="doCopy('banner-inject-code',this)">Copy</button>
          <pre id="banner-inject-code" class="code-box" style="min-height:80px;font-size:11px;padding-top:36px;"></pre>
        </div>
      </div>
    </div>
  </div>
</div>
