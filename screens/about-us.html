<div id="screen-about-us" class="screen">
  <div class="form-panel"><div class="form-inner">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="section-label" style="margin:0;">About Us Sections</div>
      <button class="btn-add-block" onclick="aboutUsCreateSection()" style="margin:0;">+ New Section</button>
    </div>
    <div id="au-section-list" class="block-list"></div>
    <div id="au-status" style="font-size:12px;min-height:18px;"></div>

    <div class="section-label">Section Setup</div>
    <div class="field">
      <label>Section name <span class="hint">(for CMS identification)</span></label>
      <input type="text" id="au-name" value="About Us Section 1">
    </div>

    <div class="section-label">Section Header</div>
    <div class="field">
      <label>Eyebrow text</label>
      <input type="text" id="au-eyebrow" value="ABOUT VERTEX LEARNING SOLUTIONS">
    </div>
    <div class="field">
      <label>Section title</label>
      <input type="text" id="au-title" value="What is VLS and who is it for?">
    </div>

    <div class="section-label">Paragraphs</div>
    <div id="au-paragraphs" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="aboutUsAddParagraph()">+ Add paragraph</button>

    <div class="section-label">CTA</div>
    <div class="field">
      <label>CTA text</label>
      <input type="text" id="au-cta-text" value="Learn more about VLS &rarr;">
    </div>
    <div class="field">
      <label>CTA URL</label>
      <input type="text" id="au-cta-url" value="#" placeholder="https://">
    </div>

    <div class="section-label">Right Panel Feature Cards</div>
    <div id="au-cards" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="aboutUsAddCard()">+ Add feature card</button>

    <button class="btn-gen" onclick="generateAboutUs()">Generate &amp; Save</button>
  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="about-us-ot-preview" onclick="switchOut('about-us','preview')">Preview</div>
      <div class="out-tab" id="about-us-ot-html" onclick="switchOut('about-us','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="about-us-preview-wrap" class="preview-wrap"></div>
      <div id="about-us-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('about-us-code',this)">Copy</button>
        <pre id="about-us-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
