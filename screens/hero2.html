<div id="screen-hero2" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Component manager ── -->
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 8px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn-gen" style="flex:1;padding:9px" onclick="h2CmpSave()">Save Component</button>
        <button class="btn-gen" style="flex:1;padding:9px;background:#16a34a" onclick="generateHero2()">Generate HTML</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <select id="h2-cmp-sel" onchange="h2CmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
        <button class="btn-sm" onclick="h2CmpNew()">+ New</button>
        <button class="btn-sm danger" id="h2-cmp-del" style="display:none" onclick="h2CmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Component name</label>
        <input type="text" id="h2-cmp-name" placeholder="e.g. Homepage Hero — ACCA">
      </div>
      <span id="h2-cmp-status" style="font-size:12px;display:block;min-height:14px;text-align:center;"></span>
    </div>

    <!-- ── Background & layout ── -->
    <div class="section-label">Background &amp; layout</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Background colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="h2-bg-cp" value="#0d1f3c" oninput="document.getElementById('h2-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="h2-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-bg-cp').value=v">
        </div>
      </div>
      <div class="field"><label>Left col width %</label>
        <select id="h2-left-w">
          <option value="45">45 / 55</option>
          <option value="50">50 / 50</option>
          <option value="55" selected>55 / 45</option>
          <option value="60">60 / 40</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">
      <div class="field"><label>Pad top</label><input type="number" id="h2-pad-top" value="80" min="0" max="300"></div>
      <div class="field"><label>Pad bot</label><input type="number" id="h2-pad-bot" value="80" min="0" max="300"></div>
      <div class="field"><label>Pad left</label><input type="number" id="h2-pad-left" value="60" min="0" max="300"></div>
      <div class="field"><label>Pad right</label><input type="number" id="h2-pad-right" value="60" min="0" max="300"></div>
    </div>

    <!-- ── Left column ── -->
    <div class="section-label">Left column — eyebrow</div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:end">
      <div class="field">
        <label>Dot colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="h2-dot-cp" value="#4a90d9" oninput="document.getElementById('h2-dot-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="h2-dot-hex" value="#4a90d9" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-dot-cp').value=v">
        </div>
      </div>
      <div class="field"><label>Eyebrow text</label><input type="text" id="h2-eyebrow" value="VERTEX LEARNING SOLUTIONS"></div>
    </div>

    <div class="section-label">Heading</div>
    <div class="field"><label>Heading (regular part)</label><textarea id="h2-heading" rows="2">Courses built to&#10;help you</textarea></div>
    <div class="field"><label>Highlighted phrase <span class="hint">(shown in accent colour after regular heading)</span></label><input type="text" id="h2-highlight" value="pass first time."></div>
    <div class="field">
      <label>Highlight colour</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="h2-hl-cp" value="#4a90d9" oninput="document.getElementById('h2-hl-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="h2-hl-hex" value="#4a90d9" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-hl-cp').value=v">
      </div>
    </div>

    <div class="section-label">Body paragraph</div>
    <div class="field"><textarea id="h2-body" rows="3">Browse our full library of expert-led ACCA, CIMA, CMA, and CIA courses — each designed with a single goal in mind: helping accounting and finance professionals pass their exams and advance their careers.</textarea></div>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:4px">Tag pills</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      <div class="field">
        <label>Tag background</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="h2-tag-bg-cp" value="#1e3550" oninput="document.getElementById('h2-tag-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="h2-tag-bg-hex" value="#1e3550" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-tag-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Tag text colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="h2-tag-tc-cp" value="#94a3b8" oninput="document.getElementById('h2-tag-tc-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="h2-tag-tc-hex" value="#94a3b8" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-tag-tc-cp').value=v">
        </div>
      </div>
    </div>
    <div id="h2-tags" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="h2AddTag()">+ Add tag</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">CTA buttons</div>
    <div id="h2-ctas" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="h2AddCta()">+ Add button</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">Stats</div>
    <div id="h2-stats" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="h2AddStat()">+ Add stat</button>

    <!-- ── Right column ── -->
    <div class="section-label">Right column — category cards</div>
    <div class="field">
      <label>Card background</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="h2-card-bg-cp" value="#1e3550" oninput="document.getElementById('h2-card-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="h2-card-bg-hex" value="#1e3550" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('h2-card-bg-cp').value=v">
      </div>
    </div>
    <div id="h2-rcards" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="h2AddRCard()">+ Add category card</button>

  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="hero2-ot-preview" onclick="switchOut('hero2','preview')">Preview</div>
      <div class="out-tab" id="hero2-ot-html" onclick="switchOut('hero2','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="hero2-preview-wrap" class="preview-wrap" style="padding:0"></div>
      <div id="hero2-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('hero2-code',this)">Copy</button>
        <pre id="hero2-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
