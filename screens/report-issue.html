<div id="screen-report-issue" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Save / Load ── -->
    <div style="display:flex;gap:8px;margin-bottom:2px">
      <button class="btn-gen" style="flex:1;padding:10px" onclick="riSave()">Save &amp; Generate</button>
      <button class="btn-sm" onclick="riLoad()" style="padding:8px 14px">↓ Load saved</button>
    </div>
    <span id="ri-status" style="font-size:12px;display:block;min-height:16px;text-align:center;margin-bottom:4px;"></span>

    <!-- ── Recipients ── -->
    <div class="section-label">Notification recipients</div>
    <div class="hint" style="margin-bottom:6px">Comma-separated emails that receive the report submission.</div>
    <div class="field">
      <label>Recipients</label>
      <input type="text" id="ri-recipients" value="office@vls-online.com" placeholder="email1@example.com, email2@example.com">
    </div>

    <!-- ── Hero ── -->
    <div class="section-label">Hero section</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Eyebrow</label><input type="text" id="ri-eyebrow" value="STUDENT SUPPORT"></div>
      <div class="field">
        <label>Background</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-hero-bg-cp" value="#0d1f3c" oninput="document.getElementById('ri-hero-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-hero-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-hero-bg-cp').value=v">
        </div>
      </div>
    </div>
    <div class="field"><label>Title</label><input type="text" id="ri-title" value="Report an Issue"></div>
    <div class="field"><label>Description</label><textarea id="ri-desc" rows="2">Experiencing a problem with your course or account? Let us know and we'll get it resolved as quickly as possible. A clear description helps us respond faster.</textarea></div>

    <!-- ── Left sidebar ── -->
    <div class="section-label">Left sidebar</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Sidebar width (px)</label><input type="number" id="ri-sidebar-w" value="300" min="200" max="420"></div>
      <div class="field">
        <label>Sidebar background</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-sidebar-bg-cp" value="#f8fafc" oninput="document.getElementById('ri-sidebar-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-sidebar-bg-hex" value="#f8fafc" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-sidebar-bg-cp').value=v">
        </div>
      </div>
    </div>
    <div class="field"><label>How it works — eyebrow</label><input type="text" id="ri-hiw-eyebrow" value="HOW IT WORKS"></div>
    <div class="field"><label>How it works — heading</label><input type="text" id="ri-hiw-heading" value="We'll resolve your issue quickly"></div>
    <div class="field"><label>How it works — description</label><textarea id="ri-hiw-desc" rows="2">Fill in the form with as much detail as possible. Our support team reviews every submission and aims to respond within one working day.</textarea></div>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:4px">Steps</div>
    <div id="ri-steps" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="riAddStep()">+ Add step</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">Feature cards</div>
    <div id="ri-cards" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="riAddCard()">+ Add card</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">Contact box</div>
    <div class="field"><label>Contact box title</label><input type="text" id="ri-contact-title" value="Prefer to contact us directly?"></div>
    <div class="field">
      <label>Contact box background</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="ri-contact-bg-cp" value="#0d1f3c" oninput="document.getElementById('ri-contact-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="ri-contact-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-contact-bg-cp').value=v">
      </div>
    </div>
    <div id="ri-contact-items" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="riAddContactItem()">+ Add contact item</button>

    <!-- ── Form options ── -->
    <div class="section-label">Form options</div>
    <div class="field">
      <label>Accent colour <span class="hint">(radio selected, button, links)</span></label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="ri-accent-cp" value="#204280" oninput="document.getElementById('ri-accent-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="ri-accent-hex" value="#204280" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-accent-cp').value=v">
      </div>
    </div>
    <div class="field"><label>Submit button text</label><input type="text" id="ri-btn-text" value="Submit Report →"></div>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:4px">Qualification options <span class="hint">(radio buttons)</span></div>
    <div id="ri-quals" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="riAddQual()">+ Add option</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">Issue type options <span class="hint">(dropdown)</span></div>
    <div id="ri-issues" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="riAddIssue()">+ Add option</button>

  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="report-issue-ot-preview" onclick="switchOut('report-issue','preview')">Preview</div>
      <div class="out-tab" id="report-issue-ot-html" onclick="switchOut('report-issue','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="report-issue-preview-wrap" class="preview-wrap" style="padding:0"></div>
      <div id="report-issue-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('report-issue-code',this)">Copy</button>
        <pre id="report-issue-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
