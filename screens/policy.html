<div id="screen-policy" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Saved components ── -->
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 10px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <select id="pol-cmp-sel" onchange="polCmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
        <button class="btn-sm" onclick="polCmpNew()">+ New</button>
        <button class="btn-sm danger" id="pol-cmp-del" style="display:none" onclick="polCmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Component name</label>
        <input type="text" id="pol-cmp-name" placeholder="e.g. Privacy Policy — VLS Online">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span id="pol-cmp-status" style="font-size:12px;"></span>
        <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="polCmpSave()">Save Component</button>
      </div>
    </div>

    <!-- ── Page header ── -->
    <div class="section-label">Page header</div>
    <div class="field">
      <label>Header background</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="pol-hdr-bg-cp" value="#0d1f3c" oninput="document.getElementById('pol-hdr-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="pol-hdr-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('pol-hdr-bg-cp').value=v">
      </div>
    </div>
    <div class="field"><label>Eyebrow label</label><input type="text" id="pol-eyebrow" value="LEGAL &amp; COMPLIANCE" placeholder="e.g. LEGAL &amp; COMPLIANCE"></div>
    <div class="field"><label>Page title</label><input type="text" id="pol-title" value="Privacy Policy" placeholder="e.g. Privacy Policy"></div>
    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:4px">Meta tags <span class="hint">(shown as dot-separated line below title)</span></div>
    <div id="pol-meta-list" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="polAddMeta()">+ Add meta tag</button>

    <!-- ── Layout ── -->
    <div class="section-label">Layout</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Left nav width (px)</label><input type="number" id="pol-nav-width" value="220" min="140" max="340"></div>
      <div class="field">
        <label>Left nav bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="pol-nav-bg-cp" value="#f8fafc" oninput="document.getElementById('pol-nav-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="pol-nav-bg-hex" value="#f8fafc" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('pol-nav-bg-cp').value=v">
        </div>
      </div>
    </div>
    <div class="field">
      <label>Accent colour <span class="hint">(nav active, bullet dots, table header)</span></label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="pol-accent-cp" value="#1a56a3" oninput="document.getElementById('pol-accent-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="pol-accent-hex" value="#1a56a3" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('pol-accent-cp').value=v">
      </div>
    </div>

    <!-- ── Sections ── -->
    <div class="section-label">Sections</div>
    <div id="pol-sections" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="polAddSection()">+ Add section</button>

    <button class="btn-gen" style="margin-top:8px" onclick="generatePolicy()">Generate HTML</button>

  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="policy-ot-preview" onclick="switchOut('policy','preview')">Preview</div>
      <div class="out-tab" id="policy-ot-html" onclick="switchOut('policy','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="policy-preview-wrap" class="preview-wrap" style="padding:0;overflow:auto;"></div>
      <div id="policy-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('policy-code',this)">Copy</button>
        <pre id="policy-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
