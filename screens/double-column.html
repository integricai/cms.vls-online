<div id="screen-dcs" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Saved components ── -->
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 10px">Saved Components</div>
      <div style="margin-bottom:10px;">
        <select id="dcs-cmp-sel" onchange="dcsCmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;width:100%;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        <button class="btn-sm" onclick="dcsCmpNew()">+ New</button>
        <button class="btn-sm" id="dcs-cmp-dup" style="display:none" onclick="dcsCmpDuplicate()">Duplicate</button>
        <button class="btn-sm danger" id="dcs-cmp-del" style="display:none" onclick="dcsCmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Component name</label>
        <input type="text" id="dcs-cmp-name" placeholder="e.g. About Us — Purpose &amp; Mission">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <span id="dcs-cmp-status" style="font-size:12px;"></span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="dcsCmpSave()">Save Component</button>
          <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="generateDcs()">Generate HTML</button>
        </div>
      </div>
    </div>

    <!-- ── Layout ── -->
    <div class="section-label">Layout</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Padding top (px)</label><input type="number" id="dcs-pad-top" value="60" min="0" max="300"></div>
      <div class="field"><label>Padding bottom (px)</label><input type="number" id="dcs-pad-bot" value="60" min="0" max="300"></div>
      <div class="field"><label>Padding left (px)</label><input type="number" id="dcs-pad-left" value="48" min="0" max="300"></div>
      <div class="field"><label>Padding right (px)</label><input type="number" id="dcs-pad-right" value="48" min="0" max="300"></div>
    </div>
    <div class="field">
      <label>Column split</label>
      <select id="dcs-left-width">
        <option value="40">40 / 60</option>
        <option value="45">45 / 55</option>
        <option value="50" selected>50 / 50</option>
        <option value="55">55 / 45</option>
        <option value="60">60 / 40</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Left column bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs-left-bg-cp" value="#132239" oninput="document.getElementById('dcs-left-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs-left-bg-hex" value="#132239" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-left-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Right column bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs-right-bg-cp" value="#f9fafb" oninput="document.getElementById('dcs-right-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs-right-bg-hex" value="#f9fafb" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-right-bg-cp').value=v">
        </div>
      </div>
    </div>

    <!-- ── Left column ── -->
    <div class="section-label">Left column — eyebrow &amp; heading</div>
    <div class="field"><label>Eyebrow label</label><input type="text" id="dcs-left-label" placeholder="e.g. WHO WE ARE" value="WHO WE ARE"></div>
    <div class="field"><label>Heading</label><textarea id="dcs-left-title" rows="2">Our Purpose &amp; Mission</textarea></div>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:2px">Body paragraphs</div>
    <div id="dcs-left-paras" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="dcsAddPara()">+ Add paragraph</button>

    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:8px">Bullet points</div>
    <div class="field" style="margin-top:6px">
      <label>Bullet dot colour</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="dcs-bullet-cp" value="#4a90d9" oninput="document.getElementById('dcs-bullet-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="dcs-bullet-hex" value="#4a90d9" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-bullet-cp').value=v">
      </div>
    </div>
    <div id="dcs-left-bullets" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="dcsAddBullet()">+ Add bullet point</button>

    <!-- ── Right column ── -->
    <div class="section-label">Right column — label &amp; stats</div>
    <div class="field"><label>Section label <span class="hint">(above stats)</span></label><input type="text" id="dcs-right-label" placeholder="e.g. OUR IMPACT" value="OUR IMPACT"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Stats card bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs-stat-bg-cp" value="#ffffff" oninput="document.getElementById('dcs-stat-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs-stat-bg-hex" value="#ffffff" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-stat-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Stats card border</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs-stat-border-cp" value="#e5e7eb" oninput="document.getElementById('dcs-stat-border-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs-stat-border-hex" value="#e5e7eb" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-stat-border-cp').value=v">
        </div>
      </div>
    </div>
    <div class="field">
      <label>Stats per row</label>
      <select id="dcs-stats-per-row">
        <option value="2" selected>2 per row</option>
        <option value="3">3 per row</option>
      </select>
    </div>
    <div id="dcs-stats" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="dcsAddStat()">+ Add stat item</button>

    <!-- ── Quote block ── -->
    <div class="section-label">Quote block</div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="dcs-quote-show" checked onchange="document.getElementById('dcs-quote-fields').style.display=this.checked?'':'none'">
        Show quote block
      </label>
    </div>
    <div id="dcs-quote-fields">
      <div class="field">
        <label>Quote bg colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs-quote-bg-cp" value="#eef2f8" oninput="document.getElementById('dcs-quote-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs-quote-bg-hex" value="#eef2f8" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs-quote-bg-cp').value=v">
        </div>
      </div>
      <div class="field"><label>Quote text</label><textarea id="dcs-quote-text" rows="3">"We are in a growth industry operating in an international environment — there is great potential for people committed to building this company with us."</textarea></div>
      <div class="field"><label>Attribution</label><input type="text" id="dcs-quote-attrib" value="— Vertex Learning Solutions leadership"></div>
    </div>

  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="dcs-ot-preview" onclick="switchOut('dcs','preview')">Preview</div>
      <div class="out-tab" id="dcs-ot-html" onclick="switchOut('dcs','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="dcs-preview-wrap" class="preview-wrap" style="padding:0"></div>
      <div id="dcs-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('dcs-code',this)">Copy</button>
        <pre id="dcs-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
