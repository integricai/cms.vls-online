<div id="screen-course-desc" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Component manager ── -->
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 8px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
        <button class="btn-gen" style="flex:1;min-width:120px;padding:9px" onclick="cdescCmpSave()">💾 Save</button>
        <button class="btn-gen" style="flex:1;min-width:120px;padding:9px;background:#16a34a" onclick="generateCourseDesc()">⚡ Generate HTML</button>
        <button class="btn-sm" onclick="cdescCmpNew()" style="padding:8px 12px">+ New</button>
        <button class="btn-sm" id="cdesc-cmp-dup" style="display:none;padding:8px 12px" onclick="cdescCmpDuplicate()">⧉ Duplicate</button>
        <button class="btn-sm danger" id="cdesc-cmp-del" style="display:none;padding:8px 12px" onclick="cdescCmpDelete()">Delete</button>
      </div>
      <select id="cdesc-cmp-sel" onchange="cdescCmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;width:100%;outline:none;background:#fff;color:var(--text);margin-bottom:8px;">
        <option value="">— select to load —</option>
      </select>
      <div class="field" style="margin-bottom:6px">
        <label>Component name</label>
        <input type="text" id="cdesc-cmp-name" placeholder="e.g. ACCA FA1 — Course Description">
      </div>
      <span id="cdesc-cmp-status" style="font-size:12px;display:block;min-height:14px;text-align:center;"></span>
    </div>

    <!-- ── Section header ── -->
    <div class="section-label">Section Header</div>
    <div style="display:grid;grid-template-columns:64px 1fr;gap:8px">
      <div class="field">
        <label>Icon</label>
        <input type="text" id="cdesc-icon" value="📖" placeholder="📖" style="font-size:20px;text-align:center;">
      </div>
      <div class="field">
        <label>Title text</label>
        <input type="text" id="cdesc-title" value="About This Course" placeholder="About This Course">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Title colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="cdesc-title-tc-cp" value="#1a1a1a" oninput="document.getElementById('cdesc-title-tc-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="cdesc-title-tc-hex" value="#1a1a1a" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('cdesc-title-tc-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Title size (px)</label>
        <input type="number" id="cdesc-title-size" value="14" min="10" max="36">
      </div>
    </div>

    <!-- ── Always visible intro ── -->
    <div class="section-label">Always Visible <span class="hint">(above Read More)</span></div>
    <div class="hint" style="margin-bottom:8px;font-size:11px;">Select text in any field below, then click <strong>A</strong> to colour it or <strong>B</strong> to bold it.</div>

    <div class="field">
      <label>Bold intro line</label>
      <div class="cdesc-toolbar">
        <span>Colour selection:</span>
        <label class="cdesc-color-btn" title="Apply colour to selected text">
          <input type="color" value="#204280" oninput="cdescColorSel(this)">
          <span class="cdesc-a">A</span>
        </label>
        <button type="button" class="btn-sm" style="padding:2px 8px;font-weight:700;" onclick="cdescBoldSel(this)">B</button>
        <button type="button" class="btn-sm" style="padding:2px 8px;" onclick="cdescClearSel(this)" title="Remove all HTML tags from selection">✕ clear</button>
      </div>
      <textarea id="cdesc-intro-bold" rows="2">Start your ACCA journey with the qualification&#39;s first building block.</textarea>
    </div>

    <div class="field">
      <label>Paragraph 1</label>
      <div class="cdesc-toolbar">
        <span>Colour selection:</span>
        <label class="cdesc-color-btn" title="Apply colour to selected text">
          <input type="color" value="#204280" oninput="cdescColorSel(this)">
          <span class="cdesc-a">A</span>
        </label>
        <button type="button" class="btn-sm" style="padding:2px 8px;font-weight:700;" onclick="cdescBoldSel(this)">B</button>
        <button type="button" class="btn-sm" style="padding:2px 8px;" onclick="cdescClearSel(this)" title="Remove all HTML tags from selection">✕ clear</button>
      </div>
      <textarea id="cdesc-intro-p1" rows="3">FA1 Recording Financial Transactions is the entry point into the ACCA Foundations in Accountancy (FIA) pathway. Whether you&#39;re brand new to accounting or returning to formalise your skills, this course gives you everything you need to understand how financial information flows through a business — from the very first document all the way to the trial balance.</textarea>
    </div>

    <div class="field">
      <label>Paragraph 2 <span class="hint">(optional)</span></label>
      <div class="cdesc-toolbar">
        <span>Colour selection:</span>
        <label class="cdesc-color-btn" title="Apply colour to selected text">
          <input type="color" value="#204280" oninput="cdescColorSel(this)">
          <span class="cdesc-a">A</span>
        </label>
        <button type="button" class="btn-sm" style="padding:2px 8px;font-weight:700;" onclick="cdescBoldSel(this)">B</button>
        <button type="button" class="btn-sm" style="padding:2px 8px;" onclick="cdescClearSel(this)" title="Remove all HTML tags from selection">✕ clear</button>
      </div>
      <textarea id="cdesc-intro-p2" rows="2">No prior accounting knowledge is required. This course is deliberately designed as a clean starting point — so even if you&#39;ve never seen a journal entry before, you&#39;ll build a solid, exam-ready understanding from the ground up.</textarea>
    </div>

    <!-- ── Expandable blocks ── -->
    <div class="section-label">Below "Read More" <span class="hint">(expandable blocks)</span></div>
    <div id="cdesc-blocks" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="cdescToggleBlockPicker()">+ Add block</button>
    <div id="cdesc-block-picker" style="display:none;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:4px;">
      <div style="padding:8px 12px;background:#f9fafb;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Choose block type</div>
      <button onclick="addCdescBlock('paragraph')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Paragraph</button>
      <button onclick="addCdescBlock('heading-paragraph')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Heading + Paragraph</button>
      <button onclick="addCdescBlock('heading-bullets')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Heading + Bullet list</button>
      <button onclick="addCdescBlock('bullets')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Bullet list (no heading)</button>
      <button onclick="addCdescBlock('items')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Item list (heading + para per item)</button>
      <button onclick="addCdescBlock('note')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Note / callout</button>
    </div>

  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="course-desc-ot-preview" onclick="switchOut('course-desc','preview')">Preview</div>
      <div class="out-tab" id="course-desc-ot-html" onclick="switchOut('course-desc','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="course-desc-preview-wrap" class="preview-wrap"></div>
      <div id="course-desc-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('course-desc-code',this)">Copy</button>
        <pre id="course-desc-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
