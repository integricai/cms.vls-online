<div id="screen-desc" class="screen">
  <div class="form-panel"><div class="form-inner">
    <div class="section-label">Above "Read More" — always visible</div>
    <div class="field"><label>Bold intro line</label><input type="text" id="desc-intro-bold" value="Start your ACCA journey with the qualification's first building block."></div>
    <div class="field"><label>Paragraph 1</label><textarea id="desc-intro-p1" rows="3">FA1 Recording Financial Transactions is the entry point into the ACCA Foundations in Accountancy (FIA) pathway. Whether you're brand new to accounting or returning to formalise your skills, this course gives you everything you need to understand how financial information flows through a business from the very first document all the way to the trial balance.</textarea></div>
    <div class="field"><label>Paragraph 2 <span class="hint">(optional)</span></label><textarea id="desc-intro-p2" rows="2">No prior accounting knowledge is required. This is deliberately designed as a clean starting point.</textarea></div>
    <div class="section-label">Below "Read More" — expandable blocks</div>
    <div id="desc-blocks" class="block-list"></div>
    <button class="btn-add-block" onclick="toggleBlockPicker()">+ Add block</button>
    <div id="block-type-picker" style="display:none;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <div style="padding:8px 12px;background:#f9fafb;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Choose block type</div>
      <button onclick="addDescBlock('paragraph')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Paragraph</button>
      <button onclick="addDescBlock('heading-paragraph')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Heading + Paragraph</button>
      <button onclick="addDescBlock('heading-bullets')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Heading + Bullet list</button>
      <button onclick="addDescBlock('bullets')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Bullet list (no heading)</button>
      <button onclick="addDescBlock('items')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Item list (heading + para per item)</button>
      <button onclick="addDescBlock('note')" style="display:block;width:100%;text-align:left;padding:9px 14px;border:none;border-top:1px solid var(--border);background:#fff;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer">Note / callout</button>
    </div>
    <button class="btn-gen" onclick="generateDesc()">Generate HTML</button>
  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="desc-ot-preview" onclick="switchOut('desc','preview')">Preview</div>
      <div class="out-tab" id="desc-ot-html" onclick="switchOut('desc','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="desc-preview-wrap" class="preview-wrap"></div>
      <div id="desc-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('desc-code',this)">Copy</button>
        <pre id="desc-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
