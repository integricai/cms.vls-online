<div id="screen-dcs2" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Saved components ── -->
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 10px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <select id="dcs2-cmp-sel" onchange="dcs2CmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
        <button class="btn-sm" onclick="dcs2CmpNew()">+ New</button>
        <button class="btn-sm danger" id="dcs2-cmp-del" style="display:none" onclick="dcs2CmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Component name</label>
        <input type="text" id="dcs2-cmp-name" placeholder="e.g. Our Values &amp; Culture">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span id="dcs2-cmp-status" style="font-size:12px;"></span>
        <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="dcs2CmpSave()">Save Component</button>
      </div>
    </div>

    <!-- ── Layout ── -->
    <div class="section-label">Layout</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Padding top (px)</label><input type="number" id="dcs2-pad-top" value="60" min="0" max="300"></div>
      <div class="field"><label>Padding bottom (px)</label><input type="number" id="dcs2-pad-bot" value="60" min="0" max="300"></div>
      <div class="field"><label>Padding left (px)</label><input type="number" id="dcs2-pad-left" value="48" min="0" max="300"></div>
      <div class="field"><label>Padding right (px)</label><input type="number" id="dcs2-pad-right" value="48" min="0" max="300"></div>
    </div>
    <div class="field">
      <label>Column split</label>
      <select id="dcs2-left-width">
        <option value="40">40 / 60</option>
        <option value="45" selected>45 / 55</option>
        <option value="50">50 / 50</option>
        <option value="55">55 / 45</option>
        <option value="60">60 / 40</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Left column bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs2-left-bg-cp" value="#ffffff" oninput="document.getElementById('dcs2-left-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs2-left-bg-hex" value="#ffffff" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs2-left-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Right column bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="dcs2-right-bg-cp" value="#132239" oninput="document.getElementById('dcs2-right-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="dcs2-right-bg-hex" value="#132239" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs2-right-bg-cp').value=v">
        </div>
      </div>
    </div>

    <!-- ── Left column ── -->
    <div class="section-label">Left column</div>
    <div class="field"><label>Eyebrow label</label><input type="text" id="dcs2-left-label" placeholder="e.g. OUR CULTURE" value="OUR CULTURE"></div>
    <div class="field"><label>Heading</label><textarea id="dcs2-left-title" rows="2">Our Values &amp; Culture</textarea></div>
    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:2px">Body paragraphs</div>
    <div id="dcs2-left-paras" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="dcs2AddPara()">+ Add paragraph</button>

    <!-- ── Right column ── -->
    <div class="section-label">Right column</div>
    <div class="field"><label>Eyebrow label</label><input type="text" id="dcs2-right-label" placeholder="e.g. WHAT WE STAND FOR" value="WHAT WE STAND FOR"></div>
    <div class="field">
      <label>Card background</label>
      <div class="cms-paragraph-color-row">
        <input type="color" id="dcs2-card-bg-cp" value="#1e3550" oninput="document.getElementById('dcs2-card-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="dcs2-card-bg-hex" value="#1e3550" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('dcs2-card-bg-cp').value=v">
      </div>
    </div>
    <div id="dcs2-cards" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="dcs2AddCard()">+ Add card</button>

    <button class="btn-gen" style="margin-top:8px" onclick="generateDcs2()">Generate HTML</button>

  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="dcs2-ot-preview" onclick="switchOut('dcs2','preview')">Preview</div>
      <div class="out-tab" id="dcs2-ot-html" onclick="switchOut('dcs2','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="dcs2-preview-wrap" class="preview-wrap" style="padding:0"></div>
      <div id="dcs2-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('dcs2-code',this)">Copy</button>
        <pre id="dcs2-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
