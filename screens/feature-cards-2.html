<div id="screen-feature-cards-2" class="screen">
  <div class="form-panel"><div class="form-inner">

    <div class="section-label">Standard Options</div>

    <div class="field">
      <label>Section background</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="color" id="fc2-bg-picker" value="#f0f4f8" oninput="document.getElementById('fc2-bg-text').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="fc2-bg-text" value="#f0f4f8" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('fc2-bg-picker').value=v" style="font-family:'Poppins',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none">
      </div>
    </div>

    <div class="field">
      <label>Common divider line colour <span class="hint">(applies to all cards)</span></label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="color" id="fc2-div-picker" value="#204280" oninput="document.getElementById('fc2-div-text').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="fc2-div-text" value="#204280" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('fc2-div-picker').value=v" style="font-family:'Poppins',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Padding top (px)</label><input type="number" id="fc2-pad-top" value="60" min="0" max="200"></div>
      <div class="field"><label>Padding bottom (px)</label><input type="number" id="fc2-pad-bot" value="60" min="0" max="200"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Padding left (px)</label><input type="number" id="fc2-pad-left" value="0" min="0" max="200"></div>
      <div class="field"><label>Padding right (px)</label><input type="number" id="fc2-pad-right" value="0" min="0" max="200"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Font size — desc (px)</label><input type="number" id="fc2-font-size" value="14" min="10" max="24"></div>
      <div class="field">
        <label>Columns</label>
        <select id="fc2-cols">
          <option value="3" selected>3 columns</option>
          <option value="2">2 columns</option>
          <option value="4">4 columns</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end">
      <div class="field">
        <label>Font colour — titles</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="color" id="fc2-fc-picker" value="#204280" oninput="document.getElementById('fc2-fc-text').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="fc2-fc-text" value="#204280" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('fc2-fc-picker').value=v" style="font-family:'Poppins',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none">
        </div>
      </div>
      <div class="field" style="flex-direction:row;align-items:center;gap:8px;padding-bottom:9px">
        <input type="checkbox" id="fc2-bold" checked style="width:16px;height:16px;cursor:pointer;accent-color:var(--purple);flex-shrink:0">
        <label for="fc2-bold" style="font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;margin:0;color:#262a32">Bold titles</label>
      </div>
    </div>

    <div class="section-label">Cards</div>
    <div id="fc2-cards" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="fc2AddCard()">+ Add card</button>

    <button class="btn-gen" onclick="generateFeatureCards2()">Generate HTML</button>
  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="feature-cards-2-ot-preview" onclick="switchOut('feature-cards-2','preview')">Preview</div>
      <div class="out-tab" id="feature-cards-2-ot-html" onclick="switchOut('feature-cards-2','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="feature-cards-2-preview-wrap" class="preview-wrap"></div>
      <div id="feature-cards-2-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('feature-cards-2-code',this)">Copy</button>
        <pre id="feature-cards-2-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
