<div id="screen-report-thank-you" class="screen">
  <div class="form-panel"><div class="form-inner">

    <!-- ── Save / Load ── -->
    <div style="display:flex;gap:8px;margin-bottom:2px">
      <button class="btn-gen" style="flex:1;padding:10px" onclick="riTySave()">Save &amp; Generate</button>
      <button class="btn-sm" onclick="riTyLoad()" style="padding:8px 14px">↓ Load saved</button>
    </div>
    <span id="ri-ty-status" style="font-size:12px;display:block;min-height:16px;text-align:center;margin-bottom:4px;"></span>

    <!-- ── Hero ── -->
    <div class="section-label">Hero section</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Background</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-hero-bg-cp" value="#0d1f3c" oninput="document.getElementById('ri-ty-hero-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-hero-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-hero-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Icon bg</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-icon-bg-cp" value="#1e3a5f" oninput="document.getElementById('ri-ty-icon-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-icon-bg-hex" value="#1e3a5f" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-icon-bg-cp').value=v">
        </div>
      </div>
    </div>
    <div class="field"><label>Heading</label><input type="text" id="ri-ty-heading" value="Report Received"></div>
    <div class="field"><label>Subtitle</label><input type="text" id="ri-ty-subtitle" value="Thank you for getting in touch — we're on it."></div>
    <div class="field"><label>Reference label</label><input type="text" id="ri-ty-ref-label" value="YOUR REFERENCE NUMBER"></div>

    <!-- ── What happens next ── -->
    <div class="section-label">What happens next</div>
    <div class="field"><label>Section label</label><input type="text" id="ri-ty-steps-label" value="WHAT HAPPENS NEXT"></div>
    <div id="ri-ty-steps" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="riTyAddStep()">+ Add step</button>

    <!-- ── Follow-up box ── -->
    <div class="section-label">Follow-up box</div>
    <div class="field"><label>Title</label><input type="text" id="ri-ty-fu-title" value="Need to follow up sooner?"></div>
    <div class="field"><label>Description</label><input type="text" id="ri-ty-fu-desc" value="Reach us directly via email or WhatsApp and quote your reference number."></div>
    <div class="section-label" style="font-size:10px;border:none;padding-bottom:0;margin-top:4px">Contact items</div>
    <div id="ri-ty-contacts" class="block-list" style="margin-top:4px"></div>
    <button class="btn-add-block" style="margin-top:4px" onclick="riTyAddContact()">+ Add contact</button>

    <!-- ── Buttons ── -->
    <div class="section-label">Action buttons</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Button 1 text</label><input type="text" id="ri-ty-btn1-text" value="← Back to my courses"></div>
      <div class="field"><label>Button 1 URL</label><input type="text" id="ri-ty-btn1-url" value="/courses" placeholder="https://"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Button 1 bg colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-btn1-bg-cp" value="#0d1f3c" oninput="document.getElementById('ri-ty-btn1-bg-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-btn1-bg-hex" value="#0d1f3c" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-btn1-bg-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Button 1 text colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-btn1-tc-cp" value="#ffffff" oninput="document.getElementById('ri-ty-btn1-tc-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-btn1-tc-hex" value="#ffffff" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-btn1-tc-cp').value=v">
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <div class="field"><label>Button 2 text</label><input type="text" id="ri-ty-btn2-text" value="Browse all courses →"></div>
      <div class="field"><label>Button 2 URL</label><input type="text" id="ri-ty-btn2-url" value="/courses" placeholder="https://"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Button 2 border colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-btn2-bc-cp" value="#204280" oninput="document.getElementById('ri-ty-btn2-bc-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-btn2-bc-hex" value="#204280" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-btn2-bc-cp').value=v">
        </div>
      </div>
      <div class="field">
        <label>Button 2 text colour</label>
        <div class="cms-paragraph-color-row">
          <input type="color" id="ri-ty-btn2-tc-cp" value="#204280" oninput="document.getElementById('ri-ty-btn2-tc-hex').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
          <input type="text" id="ri-ty-btn2-tc-hex" value="#204280" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('ri-ty-btn2-tc-cp').value=v">
        </div>
      </div>
    </div>

  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="report-thank-you-ot-preview" onclick="switchOut('report-thank-you','preview')">Preview</div>
      <div class="out-tab" id="report-thank-you-ot-html" onclick="switchOut('report-thank-you','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="report-thank-you-preview-wrap" class="preview-wrap" style="padding:0"></div>
      <div id="report-thank-you-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('report-thank-you-code',this)">Copy</button>
        <pre id="report-thank-you-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
