<div id="screen-hero" class="screen">
  <div class="form-panel"><div class="form-inner">

    <div class="section-label">Layout</div>
    <div class="field">
      <label>Background colour</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="color" id="hero-bg-picker" value="#ffffff" oninput="document.getElementById('hero-bg-text').value=this.value" style="width:40px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">
        <input type="text" id="hero-bg-text" value="#ffffff" oninput="var v=this.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('hero-bg-picker').value=v" style="font-family:'Poppins',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none">
      </div>
    </div>
    <div class="field">
      <label>Max width</label>
      <select id="hero-max-width">
        <option value="480px">Narrow — 480px</option>
        <option value="560px" selected>Default — 560px</option>
        <option value="640px">Wide — 640px</option>
        <option value="720px">Wider — 720px</option>
        <option value="100%">Full — 100%</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field">
        <label>Padding top (px)</label>
        <input type="number" id="hero-pad-top" value="48" min="0" max="200">
      </div>
      <div class="field">
        <label>Padding bottom (px)</label>
        <input type="number" id="hero-pad-bot" value="48" min="0" max="200">
      </div>
    </div>
    <div class="field">
      <label>H1 font size (px)</label>
      <input type="number" id="hero-h1-size" value="44" min="24" max="80">
    </div>

    <div class="section-label">Eyebrow</div>
    <div class="field">
      <label>Eyebrow text <span class="hint">(small label above heading)</span></label>
      <input type="text" id="hero-eyebrow" value="VERTEX LEARNING SOLUTIONS">
    </div>

    <div class="section-label">Heading</div>
    <div class="field">
      <label>H1 — Main line</label>
      <input type="text" id="hero-h1" value="Expert-led tutoring &amp; coaching">
    </div>
    <div class="field">
      <label>H1 — Highlighted line <span class="hint">(displays in VLS blue)</span></label>
      <input type="text" id="hero-h1-hl" value="— built for results.">
    </div>
    <div class="field">
      <label>H2 — Sub-heading <span class="hint">(optional, appears below H1)</span></label>
      <input type="text" id="hero-h2" placeholder="Optional sub-heading">
    </div>

    <div class="section-label">Description</div>
    <div class="field">
      <label>Body text</label>
      <textarea id="hero-desc" rows="4">Vertex Learning Solutions (VLS) connects ambitious learners with expert tutors across ACCA, CIMA, and CMA — giving you structured guidance, practical tools, and 1-to-1 support to pass your exams and grow your career.</textarea>
    </div>

    <div class="section-label">Tag Pills</div>
    <div id="hero-tags" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="heroAddTag()">+ Add tag</button>

    <div class="section-label">Call to Action Buttons</div>
    <div class="field"><label>Primary button text</label><input type="text" id="hero-btn1-text" value="Browse courses"></div>
    <div class="field"><label>Primary button URL</label><input type="text" id="hero-btn1-url" placeholder="https://"></div>
    <div class="field">
      <label>Primary — scroll to class/ID <span class="hint">(overrides URL, e.g. .section-faq or #courses)</span></label>
      <input type="text" id="hero-btn1-scroll" placeholder=".my-section or #my-section">
    </div>
    <div class="field"><label>Secondary button text</label><input type="text" id="hero-btn2-text" value="Enquire now ↓"></div>
    <div class="field"><label>Secondary button URL</label><input type="text" id="hero-btn2-url" placeholder="https://"></div>
    <div class="field">
      <label>Secondary — scroll to class/ID <span class="hint">(overrides URL, e.g. .section-form or #enquire)</span></label>
      <input type="text" id="hero-btn2-scroll" placeholder=".my-section or #my-section">
    </div>

    <div class="section-label">Stats</div>
    <div id="hero-stats" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="heroAddStat()">+ Add stat</button>

    <button class="btn-gen" onclick="generateHero()">Generate HTML</button>
  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="hero-ot-preview" onclick="switchOut('hero','preview')">Preview</div>
      <div class="out-tab" id="hero-ot-html" onclick="switchOut('hero','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="hero-preview-wrap" class="preview-wrap" style="background:#f8f9fc"></div>
      <div id="hero-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('hero-code',this)">Copy</button>
        <pre id="hero-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
