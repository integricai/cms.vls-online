<div id="screen-left-generic-section" class="screen">
  <div class="form-panel"><div class="form-inner">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="section-label" style="margin:0;">Sections</div>
      <button class="btn-add-block" onclick="lgsCreateSection()" style="margin:0;">+ New Section</button>
    </div>
    <div id="lgs-section-list" class="block-list"></div>
    <div id="lgs-status" style="font-size:12px;min-height:18px;"></div>

    <div class="section-label">Section Setup</div>
    <div class="field">
      <label>Section name <span class="hint">(for CMS identification)</span></label>
      <input type="text" id="lgs-name" value="Left Generic Section 1">
    </div>
    <div class="field">
      <label>Section background colour</label>
      <input type="color" id="lgs-bg" value="#ffffff" style="width:56px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:block;margin-top:4px;">
    </div>

    <div class="section-label">Header</div>
    <div class="field">
      <label>Eyebrow text <span class="hint">(small uppercase)</span></label>
      <input type="text" id="lgs-eyebrow" placeholder="e.g. GETTING STARTED">
    </div>
    <div class="field">
      <label>Heading</label>
      <input type="text" id="lgs-heading" placeholder="e.g. ACCA Entry Requirements">
    </div>
    <div class="field">
      <label>Description <span class="hint">(HTML allowed)</span></label>
      <textarea id="lgs-desc" rows="3" placeholder="Intro description text…"></textarea>
    </div>

    <div class="section-label">Blocks</div>
    <div id="lgs-cards" class="block-list"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
      <select id="lgs-block-type-select" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--input-bg,#fff);color:var(--fg);">
        <option value="card">Card (icon + title + description)</option>
        <option value="card-image">Card with Image</option>
        <option value="image">Image</option>
      </select>
      <button class="btn-add-block" onclick="lgsAddBlock()" style="white-space:nowrap;margin:0;">+ Add</button>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;">
      <button class="btn-gen" style="flex:1;min-width:120px;padding:9px" onclick="lgsSave()">&#x1F4BE; Save</button>
      <button class="btn-gen" style="flex:1;min-width:120px;padding:9px;background:#16a34a" onclick="lgsGenerate()">&#x26A1; Generate HTML</button>
    </div>
  </div></div>

  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="left-generic-section-ot-preview" onclick="switchOut('left-generic-section','preview')">Preview</div>
      <div class="out-tab" id="left-generic-section-ot-html" onclick="switchOut('left-generic-section','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="left-generic-section-preview-wrap" class="preview-wrap"></div>
      <div id="left-generic-section-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('left-generic-section-code',this)">Copy</button>
        <pre id="left-generic-section-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
