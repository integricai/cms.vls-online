<div id="screen-faq" class="screen">

  <div class="form-panel" style="flex:1;width:auto;max-width:none;">
    <div class="form-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="section-label" style="margin:0;">FAQ Sections</div>
        <button class="btn-add-block" onclick="addFaqSection()" style="margin:0;">+ New Section</button>
      </div>
      <div id="faq-section-list">
        <div style="text-align:center;padding:16px;font-size:12px;color:var(--muted);">No sections yet. Click + New Section to get started.</div>
      </div>
      <div id="faq-status" style="font-size:12px;margin-top:8px;min-height:18px;"></div>
    </div>
  </div>

  <div class="output-panel">
    <div class="output-topbar">
      <div id="faq-ot-preview" class="out-tab active" onclick="switchFaqOut('preview')">Preview</div>
      <div id="faq-ot-code" class="out-tab" onclick="switchFaqOut('code')">Code</div>
    </div>
    <div class="output-body">
      <div id="faq-preview-wrap" class="preview-wrap">
        <div style="text-align:center;padding:40px 0;font-size:13px;color:var(--muted);">Create a section and click Generate &amp; Save to preview.</div>
      </div>
      <div id="faq-code-wrap" style="display:none;position:relative;">
        <button class="btn-copy" style="position:absolute;top:12px;right:12px;" onclick="doCopy('faq-code-box',this)">Copy</button>
        <div class="code-box" id="faq-code-box" style="min-height:300px;"></div>
      </div>
    </div>
  </div>

</div>
