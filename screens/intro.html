<div id="screen-intro" class="screen">
  <div class="form-panel"><div class="form-inner">
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 10px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <select id="intro-cmp-sel" onchange="introCmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
        <button class="btn-sm" onclick="introCmpNew()">+ New</button>
        <button class="btn-sm danger" id="intro-cmp-del" style="display:none" onclick="introCmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Component name</label>
        <input type="text" id="intro-cmp-name" placeholder="e.g. FA1 Course Intro — Page A">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span id="intro-cmp-status" style="font-size:12px;"></span>
        <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="introCmpSave()">Save Component</button>
      </div>
    </div>
    <div class="section-label">Template</div>
    <div class="field">
      <label>Introduction type</label>
      <select id="intro-type" onchange="loadIntroTemplate()">
        <option value="course">Online Course</option>
        <option value="notes">Study Notes</option>
      </select>
    </div>
    <div class="section-label">Page headings</div>
    <div class="field"><label>H1 — Course title</label><input type="text" id="intro-h1" value="ACCA FA1 Recording Financial Transactions"></div>
    <div class="field"><label>H2 — Subtitle / strapline</label><textarea id="intro-h2" rows="3">Master the foundations of bookkeeping and pass your FA1 exam with confidence expert-led, exam-focused, and built for complete beginners.</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Padding left (px)</label><input type="number" id="intro-pad-left" value="0" min="0" max="200"></div>
      <div class="field"><label>Padding right (px)</label><input type="number" id="intro-pad-right" value="0" min="0" max="200"></div>
    </div>
    <div class="section-label">Features section</div>
    <div class="field"><label>Features heading</label><input type="text" id="intro-feat-heading" value="Detailed Study Notes"></div>
    <div class="field">
      <label>Feature items <span class="hint">(tick list — 2 columns)</span></label>
      <div id="intro-features" class="block-list"></div>
      <button class="btn-add-block" style="margin-top:6px" onclick="addFeature()">+ Add feature item</button>
    </div>
    <div class="section-label">Additional Paragraphs <span class="hint" style="text-transform:none;letter-spacing:0">(appear below the features block)</span></div>
    <div id="intro-paragraphs" class="block-list"></div>
    <button class="btn-add-block" style="margin-top:6px" onclick="addIntroParagraph()">+ Add paragraph</button>
    <div class="section-label">Call to action</div>
    <div class="field"><label>Button label</label><input type="text" id="intro-cta-text" value="Enroll Now"></div>
    <div class="field"><label>Button URL</label><input type="text" id="intro-cta-url" value="https://vls-online.com/courses/fa1/buy/?preview=on&themeid=0"></div>
    <button class="btn-gen" onclick="generateIntro()">Generate HTML</button>
  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="intro-ot-preview" onclick="switchOut('intro','preview')">Preview</div>
      <div class="out-tab" id="intro-ot-html" onclick="switchOut('intro','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="intro-preview-wrap" class="preview-wrap"></div>
      <div id="intro-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('intro-code',this)">Copy</button>
        <pre id="intro-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
