<div id="screen-tabs" class="screen">
  <div class="form-panel"><div class="form-inner">
    <div style="background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:2px;">
      <div class="section-label" style="margin:0 0 10px">Saved Components</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <select id="tabs-cmp-sel" onchange="tabsCmpLoad(this.value)" style="font-family:'Poppins',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;flex:1;outline:none;background:#fff;color:var(--text);">
          <option value="">— select to load —</option>
        </select>
        <button class="btn-sm" onclick="tabsCmpNew()">+ New</button>
        <button class="btn-sm danger" id="tabs-cmp-del" style="display:none" onclick="tabsCmpDelete()">Delete</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Component name</label>
        <input type="text" id="tabs-cmp-name" placeholder="e.g. FA1 Tabs — Course Page">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span id="tabs-cmp-status" style="font-size:12px;"></span>
        <button class="btn-gen" style="width:auto;padding:8px 20px;margin:0" onclick="tabsCmpSave()">Save Component</button>
      </div>
    </div>
    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
      Tabs
      <button class="btn-sm" onclick="tabsAddTab()">+ Add tab</button>
    </div>
    <div id="tabs-pill-bar" class="tab-pills"></div>
    <div id="tabs-editor-area" style="display:flex;flex-direction:column;gap:14px;"></div>
    <button class="btn-gen" onclick="generateTabs()">Generate HTML</button>
  </div></div>
  <div class="output-panel">
    <div class="output-topbar">
      <div class="out-tab active" id="tabs-ot-preview" onclick="switchOut('tabs','preview')">Preview</div>
      <div class="out-tab" id="tabs-ot-html" onclick="switchOut('tabs','html')">HTML</div>
    </div>
    <div class="output-body">
      <div id="tabs-preview-wrap" class="preview-wrap"></div>
      <div id="tabs-html-wrap" class="code-wrap">
        <button class="btn-copy" onclick="doCopy('tabs-code',this)">Copy</button>
        <pre id="tabs-code" class="code-box"></pre>
      </div>
    </div>
  </div>
</div>
